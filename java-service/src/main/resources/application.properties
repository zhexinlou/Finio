server.port=8080
finio.warehouse.path=${WAREHOUSE_PATH:./warehouse}
finio.python.service.url=${PYTHON_SERVICE_URL:http://localhost:8000}
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# H2 Database
spring.datasource.url=jdbc:h2:file:./data/finio;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
finio.jwt.secret=${JWT_SECRET:finio-default-secret-key-change-in-production-must-be-at-least-256-bits}
finio.jwt.expiration-ms=86400000

# WeChat OAuth
finio.wechat.app-id=${WECHAT_APP_ID:}
finio.wechat.app-secret=${WECHAT_APP_SECRET:}

# Email
finio.email.enabled=${EMAIL_ENABLED:false}
finio.email.from=${EMAIL_FROM:noreply@finio.ai}
finio.app.base-url=${APP_BASE_URL:http://localhost:3000}

# Validation
spring.mvc.problemdetail.enabled=true
