# Production profile - uses MySQL instead of H2

# MySQL Database
spring.datasource.url=${DATABASE_URL:jdbc:mysql://mysql:3306/finio?useSSL=true&serverTimezone=Asia/Shanghai&characterEncoding=utf-8}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:finio}
spring.datasource.password=${DB_PASSWORD:finio_secret}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# Disable H2 console in production
spring.h2.console.enabled=false

# Production settings
server.port=8080
finio.jwt.secret=${JWT_SECRET}
finio.jwt.expiration-ms=86400000

# Email - enable in production
finio.email.enabled=true

# Logging
logging.level.root=WARN
logging.level.com.finio=INFO
