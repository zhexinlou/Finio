version: '3.8'

services:
  # Nginx + Frontend
  frontend:
    build: ./frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - java-service
      - python-service
    restart: unless-stopped
    networks:
      - finio-net

  # Java API Service
  java-service:
    build: ./java-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DATABASE_URL=jdbc:mysql://mysql:3306/finio?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
      - DB_USERNAME=finio
      - DB_PASSWORD=${DB_PASSWORD:-finio_secret}
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-very-long-random-secret-at-least-256-bits-long}
      - PYTHON_SERVICE_URL=http://python-service:8000
      - WAREHOUSE_PATH=/data/warehouse
      - WECHAT_APP_ID=${WECHAT_APP_ID:-}
      - WECHAT_APP_SECRET=${WECHAT_APP_SECRET:-}
      - EMAIL_ENABLED=${EMAIL_ENABLED:-false}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost}
    volumes:
      - warehouse-data:/data/warehouse
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - finio-net

  # Python AI Service
  python-service:
    build: ./python-service
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - WAREHOUSE_PATH=/data/warehouse
    volumes:
      - warehouse-data:/data/warehouse
      - chroma-data:/app/chroma_db
    restart: unless-stopped
    networks:
      - finio-net

  # MySQL Database
  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_secret}
      - MYSQL_DATABASE=finio
      - MYSQL_USER=finio
      - MYSQL_PASSWORD=${DB_PASSWORD:-finio_secret}
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - finio-net

  # Redis (for session cache, rate limiting)
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - finio-net

volumes:
  mysql-data:
  warehouse-data:
  chroma-data:
  redis-data:

networks:
  finio-net:
    driver: bridge
